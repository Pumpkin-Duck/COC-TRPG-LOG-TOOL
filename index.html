<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>COC TRPG 團錄整理工具</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --container-bg: #ffffff;
            --primary-color: #a67c52;
            --secondary-color: #8fa4b3;
            --text-color: #4a4a4a;
            --border-color: #dcdcdc;
            --bar-bg: #f4f1ea;
            --hint-red: #e07a5f;
        }

        [data-theme="dark"] {
            --bg-color: #2c2c2c;
            --container-bg: #3a3a3a;
            --primary-color: #c9ad93;
            --secondary-color: #a7b8c4;
            --text-color: #f4f1ea;
            --border-color: #555555;
            --bar-bg: #2c2c2c;
        }

        @media print {
            @page { margin: 1.5cm; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .container { box-shadow: none !important; max-width: 100% !important; padding: 0 !important; }
            .theme-switch, .input-section, .generate-btn, .action-buttons, .tool-title { display: none !important; }
            #output { display: block !important; border: none !important; padding: 0 !important; }
            #out-intro-wrapper, .info-bar, .ending-text { break-inside: avoid !important; }
        }

        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            padding: 40px 20px; margin: 0; transition: all 0.3s ease;
        }

        .container { 
            max-width: 900px; margin: auto; background: var(--container-bg); 
            padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        .theme-switch {
            position: fixed; top: 20px; right: 20px;
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--primary-color);
            background: var(--container-bg); color: var(--primary-color);
            cursor: pointer; font-weight: bold; z-index: 100;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary-color); }
        input[type="text"], textarea { 
            width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); 
            border-radius: 8px; box-sizing: border-box; background-color: var(--bg-color); color: var(--text-color);
        }

        .row { display: flex; gap: 30px; margin-bottom: 20px; }
        .col { flex: 1; min-width: 0; }

        #image-preview { 
            width: 100%; height: 200px; border: 2px dashed var(--secondary-color); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 10px; background: var(--bg-color); color: var(--secondary-color);
            text-align: center; overflow: hidden;
        }
        #image-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .generate-btn { 
            background-color: var(--primary-color); color: white; border: none; 
            padding: 15px 30px; border-radius: 8px; cursor: pointer; 
            font-size: 16px; font-weight: bold; width: 100%; margin-top: 20px;
        }

        .action-buttons { display: none; gap: 10px; margin-top: 20px; }
        .btn-dl { flex: 1; padding: 12px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; }

        #output { margin-top: 50px; padding: 40px; border: 1px solid var(--border-color); background: var(--container-bg); display: none; border-radius: 12px; }
        #out-title { text-align: center; font-size: 32px; margin-bottom: 30px; font-weight: bold; }
        #out-img { text-align: center; margin: 30px 0; }
        #out-img img { max-width: 60%; border-radius: 8px; }

        #out-intro-wrapper { background-color: var(--bar-bg); padding: 20px; border-radius: 8px; margin-bottom: 30px; border-left: 5px solid var(--primary-color); }
        #out-intro { white-space: pre-wrap; font-size: 14px; font-style: italic; margin: 0; opacity: 0.8; }

        .info-bar { background-color: var(--bar-bg); padding: 20px; border-radius: 8px; margin-bottom: 40px; border: 1px solid var(--border-color); }
        .info-line { margin-bottom: 8px; font-size: 15px; }
        .info-label { font-weight: bold; color: var(--primary-color); margin-right: 5px; }

        .ending-text { 
            font-size: 16px !important; font-weight: bold !important; 
            margin: 40px auto !important; display: block !important; text-align: center !important; 
            background-color: var(--bar-bg); padding: 15px; border-radius: 8px; 
            width: 90%; border: 1px solid var(--border-color); box-sizing: border-box;
        }

        .log-line { margin-bottom: 12px; word-wrap: break-word; }
        .typo-hint { border-bottom: 2px dashed var(--hint-red); color: var(--hint-red); cursor: help; }
    </style>
</head>
<body data-theme="light">

<button class="theme-switch" onclick="toggleTheme()">切換主題</button>

<div class="container">
    <h1 class="tool-title" style="text-align: center;">COC TRPG 團錄整理工具</h1>
    
    <div class="input-section">
        <div class="input-group">
            <label>【劇本名】</label>
            <input type="text" id="scenario-name" placeholder="輸入劇本標題">
        </div>

        <div class="row">
            <div class="col">
                <label>簡介圖片 (Ctrl+V)</label>
                <div id="image-preview" onclick="document.getElementById('image-input').click()">
                    <span>點擊或直接貼上圖片</span>
                </div>
                <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleFileSelect(this)">
            </div>
            <div class="col">
                <label>簡介</label>
                <textarea id="intro-text" style="height: 200px;" placeholder="輸入劇本簡介..."></textarea>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>ＫＰ</label>
                <input type="text" id="kp-name" placeholder="主持人名字">
            </div>
            <div class="col">
                <label>ＨＯ </label>
                <textarea id="ho-info" style="height: 100px;" placeholder="HO1 OOO&#10;HO2 XXX"></textarea>
            </div>
        </div>

        <div class="input-group">
            <label>上傳 Log HTML</label>
            <input type="file" id="html-file" accept=".html">
        </div>
    </div>

    <button class="generate-btn" onclick="processLog()">開始轉換</button>

    <div class="action-buttons" id="action-area">
        <button class="btn-dl" style="background:var(--secondary-color)" onclick="downloadHTML()">下載 HTML</button>
        <button class="btn-dl" style="background:#7a8d99" onclick="window.print()">儲存為 PDF</button>
    </div>

    <div id="output">
        <h1 id="out-title"></h1>
        <div id="out-img"></div>
        <div id="out-intro-wrapper">
            <span style="font-weight: bold; color: var(--primary-color); display: block; margin-bottom: 10px;">簡介</span>
            <p id="out-intro"></p>
        </div>
        
        <div class="info-bar" id="out-info-bar">
            </div>

        <div id="out-content"></div>
    </div>
</div>

<script>
    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    window.addEventListener('paste', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (item) displayImage(item.getAsFile());
    });
    function handleFileSelect(i) { if (i.files[0]) displayImage(i.files[0]); }
    function displayImage(b) {
        const r = new FileReader();
        r.onload = (e) => { document.getElementById('image-preview').innerHTML = `<img src="${e.target.result}">`; };
        r.readAsDataURL(b);
    }

    // 將半角 HO1 轉換為全角 【ＨＯ１】
    function formatHO(text) {
        return text.split('\n').map(line => {
            const trimmedLine = line.trim();
            if (!trimmedLine) return '';
            // 正則抓取開頭是 HO 或 ho 加數字的部分
            const match = trimmedLine.match(/^(HO|ho)(\d+)\s*(.*)/);
            if (match) {
                const num = match[2];
                const name = match[3];
                // 轉換數字為全角
                const fullNum = num.replace(/[0-9]/g, s => String.fromCharCode(s.charCodeAt(0) + 0xfee0));
                return `<div class="info-line"><span class="info-label">【ＨＯ${fullNum}】</span>${name}</div>`;
            }
            return `<div class="info-line">${trimmedLine}</div>`;
        }).join('');
    }

    function processLog() {
        const file = document.getElementById('html-file').files[0];
        if (!file) return alert("請選擇 HTML 檔案");

        const reader = new FileReader();
        reader.onload = function(e) {
            const doc = new DOMParser().parseFromString(e.target.result, 'text/html');
            const outContent = document.getElementById('out-content');
            outContent.innerHTML = '';

            doc.querySelectorAll('p').forEach(p => {
                const spans = p.querySelectorAll('span');
                if (spans.length < 3) return;
                
                let name = spans[1].innerText.trim();
                let content = spans[2].innerHTML;
                let color = p.style.color || "";
                const rawText = spans[2].innerText;
                const isEnding = rawText.match(/END|結局|劇本通關/i);

                const line = document.createElement('div');
                line.className = 'log-line';

                if (isEnding) {
                    line.className += ' ending-text';
                    line.innerHTML = rawText.trim().replace(/[\s　]+/g, ' '); 
                } else {
                    if (name === "" || name.toLowerCase() === "system") {
                        line.style.color = "var(--text-color)";
                        line.innerHTML = content;
                    } else {
                        line.style.color = color || "var(--text-color)";
                        line.innerHTML = `<strong>${name}：</strong>${content}`;
                    }
                }
                outContent.appendChild(line);
            });

            // 基本資訊處理
            document.getElementById('out-title').innerText = `【${document.getElementById('scenario-name').value || 'Log'}】`;
            document.getElementById('out-intro').innerText = document.getElementById('intro-text').value;
            
            // 處理 KP 與 HO 區塊
            const kpVal = document.getElementById('kp-name').value;
            const hoVal = document.getElementById('ho-info').value;
            let infoHTML = `<div class="info-line"><span class="info-label">【ＫＰ】</span>${kpVal || '未知'}</div>`;
            infoHTML += formatHO(hoVal);
            document.getElementById('out-info-bar').innerHTML = infoHTML;

            const img = document.getElementById('image-preview').querySelector('img');
            document.getElementById('out-img').innerHTML = img ? `<img src="${img.src}" style="max-width:300px">` : '';

            document.getElementById('output').style.display = 'block';
            document.getElementById('action-area').style.display = 'flex';
            window.scrollTo({ top: document.getElementById('output').offsetTop - 20, behavior: 'smooth' });
        };
        reader.readAsText(file, "UTF-8");
    }
     // 這裡抓取劇本標題，若沒填則預設叫 Log
    const scenarioTitle = document.getElementById('scenario-name').value || 'Log';

    // 關鍵修改：這行會讓 PDF 預設存檔名稱正確
    document.title = scenarioTitle; 

    // 下載 HTML 的部分也微調
    function downloadHTML() {
        const title = document.title; // 直接抓剛才設定好的網頁標題
        // ... 後續 blob 邏輯 ...
        a.download = `${title}_Log.html`; 
        a.click();
    }

    function downloadHTML() {
        const title = document.getElementById('scenario-name').value || 'Log';
        const style = document.querySelector('style').innerHTML;
        const theme = document.body.getAttribute('data-theme');
        const content = document.getElementById('output').outerHTML;
        const fullHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>${style} #output{display:block;border:none;} .input-section, .generate-btn, .action-buttons, .theme-switch, .tool-title{display:none !important;}</style></head><body data-theme="${theme}"><div class="container">${content}</div></body></html>`;
        const blob = new Blob([fullHTML], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${title}_團錄.html`;
        a.click();
    }
</script>

</body>

</html>
