<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="icon.webp" type="image/webp">
    <meta charset="UTF-8">
    <title>CoC TRPG 團務整理工具</title>
    <style id="dynamic-theme">
        :root {
            --bg-color: #f4f1ea;
            --container-bg: #ffffff;
            --primary-color: #a67c52;
            --secondary-color: #8fa4b3;
            --text-color: #4a4a4a;
            --border-color: #dcdcdc;
            --bar-bg: #f4f1ea;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --primary-color: #c9ad93;
            --text-color: #d1d1d1;
            --border-color: #333333;
            --bar-bg: #121212;
        }

        @media print {
            @page { margin: 1.2cm; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .container { box-shadow: none !important; max-width: 100% !important; padding: 0 !important; border: none !important; }
            .no-print { display: none !important; }
            #output { display: block !important; border: none !important; padding: 0 !important; }
            .block-styled, .ending-text, .info-bar { break-inside: avoid; }
        }

        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 40px 20px; margin: 0; line-height: 1.8; transition: all 0.3s ease; }
        .container { max-width: 950px; margin: auto; background: var(--container-bg); padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        .theme-switch { position: fixed; top: 20px; right: 20px; padding: 10px 18px; border-radius: 30px; border: 1.5px solid var(--primary-color); background: var(--container-bg); color: var(--primary-color); cursor: pointer; font-weight: bold; z-index: 100; }

        h1.tool-title { text-align: center; color: var(--primary-color); margin-bottom: 40px; font-size: 28px; letter-spacing: 2px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: var(--primary-color); font-size: 15px; }
        input[type="text"], textarea { width: 100%; padding: 14px 18px; border: 1.5px solid var(--border-color); border-radius: 12px; box-sizing: border-box; background-color: #fafafa; color: #4a4a4a; margin-bottom: 20px; font-size: 14px; transition: 0.3s; }
        [data-theme="dark"] input[type="text"], [data-theme="dark"] textarea { background-color: #2a2a2a; color: #eee; border-color: #444; }

        .row { display: flex; gap: 30px; margin-bottom: 10px; align-items: flex-start; }
        .col { flex: 1; min-width: 0; }

        .file-upload-wrapper { text-align: center; padding: 25px; border: 1.5px dashed var(--border-color); border-radius: 15px; background: rgba(0,0,0,0.01); margin-bottom: 30px; }

        /* 配置面板 */
        .config-panel { margin-top: 30px; padding: 30px; border-radius: 20px; background: rgba(0,0,0,0.02); border: 1px solid var(--border-color); display: none; }
        .config-title { font-size: 16px; font-weight: bold; color: var(--primary-color); margin-bottom: 25px; border-left: 5px solid var(--primary-color); padding-left: 15px; }
        .channel-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: var(--container-bg); padding: 12px 20px; border-radius: 15px; border: 1px solid var(--border-color); }
        
        .color-pill { display: flex; align-items: center; gap: 10px; background: #fff; padding: 6px 15px; border-radius: 50px; border: 1.5px solid var(--border-color); box-shadow: inset 0 1px 3px rgba(0,0,0,0.02); }
        [data-theme="dark"] .color-pill { background: #2a2a2a; }
        input[type="color"] { width: 26px; height: 26px; border: none; cursor: pointer; background: none; padding: 0; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
        .hex-field { border: none !important; background: transparent !important; margin-bottom: 0 !important; padding: 0 !important; width: 85px !important; font-family: monospace; font-size: 13px !important; color: inherit !important; font-weight: bold; }

        /* 輸出排序/融合邏輯 */
        #output { margin-top: 60px; padding: 50px; border: 1px solid var(--border-color); background: var(--container-bg); display: none; border-radius: 20px; }
        .log-item { cursor: grab; position: relative; }
        .log-item.dragging { opacity: 0.3; }
        .log-item.drag-over { border-top: 3px solid var(--secondary-color); }

        .log-line { margin-bottom: 1.6em; word-wrap: break-word; font-size: 15px; }
        .other-bubble { width: fit-content; max-width: 75%; margin-left: auto; padding: 12px 22px; border-radius: 20px 20px 4px 20px; text-align: right; font-size: 14px; margin-bottom: 1.4em; border-right: 5px solid var(--secondary-color); background: var(--bar-bg); }
        
        /* 融合樣式 */
        .block-styled { padding: 20px 25px; border-radius: 12px; margin: 15px 0; border-left: 6px solid var(--primary-color); transition: all 0.2s; }
        .info-tag { font-weight: bold; color: var(--primary-color); font-size: 12px; display: block; margin-bottom: 8px; }

        /* 融合後隱藏後續的小標 */
        .log-item + .log-item .block-styled[data-merged="true"] { margin-top: -16px; border-top-left-radius: 0; border-top-right-radius: 0; }
        .log-item + .log-item .block-styled[data-merged="true"] .info-tag { display: none; }
        .log-item:has(+ .log-item .block-styled[data-merged="true"]) .block-styled { border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom: 0; }

        .info-bar { background-color: var(--bar-bg); padding: 25px; border-radius: 15px; margin-bottom: 50px; border: 1.5px solid var(--border-color); }
        .ending-text { font-size: 17px; font-weight: bold; margin: 60px auto; display: block; text-align: center !important; background-color: var(--bar-bg); padding: 20px; border-radius: 12px; width: 85%; border: 1.5px solid var(--border-color); }

        .generate-btn { background-color: var(--primary-color); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-size: 17px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; box-shadow: 0 6px 15px rgba(166, 124, 82, 0.2); }
    </style>
</head>
<body data-theme="light">

<button class="theme-switch no-print" onclick="toggleTheme()">切換暗色模式</button>

<div class="container">
    <h1 class="tool-title no-print">CoC TRPG 團務整理工具</h1>
    
    <div class="input-section no-print">
        <div class="row"><div class="col"><label>劇本名</label><input type="text" id="scenario-name" placeholder="請輸入標題" oninput="liveUpdateHeader()"></div></div>
        <div class="row">
            <div class="col"><label>簡介圖片 (貼上)</label><div id="image-preview" style="width:100%; height:180px; border:2.5px dashed var(--secondary-color); display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:15px; background:rgba(0,0,0,0.02);" onclick="document.getElementById('image-input').click()"><span>點擊或貼上</span></div><input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleFileSelect(this)"></div>
            <div class="col"><label>簡介內容</label><textarea id="intro-text" style="height: 180px;" oninput="liveUpdateHeader()"></textarea></div>
        </div>
        <div class="row">
            <div class="col"><label>KP</label><input type="text" id="kp-name" oninput="liveUpdateHeader()"></div>
            <div class="col"><label>HO PL</label><textarea id="ho-info" style="height: 60px;" oninput="liveUpdateHeader()"></textarea></div>
        </div>
        <div class="file-upload-wrapper">
            <label style="margin-bottom: 10px; display: block;">上傳 CCFOLIA 下載的 Log HTML 檔案</label>
            <input type="file" id="html-file" accept=".html">
        </div>
        <div id="config-panel" class="config-panel">
            <div class="config-title">選擇輸出頻道與背板顏色</div>
            <div id="channel-options"></div>
            <div class="config-title" style="margin-top:30px;">角色對話顏色調整</div>
            <div id="character-colors" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;"></div>
        </div>
    </div>

    <button class="generate-btn no-print" onclick="firstRender()">輸出團錄 (融合標籤去重版)</button>
    <div class="action-buttons no-print" id="action-area" style="display:none; gap:15px; margin-top:30px;">
        <button onclick="downloadHTML()" style="flex:1; background:var(--secondary-color); color:white; padding:16px; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">下載整理後的 HTML</button>
        <button onclick="window.print()" style="flex:1; background:#7a8d99; color:white; padding:16px; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">儲存為 PDF</button>
    </div>

    <div id="output">
        <h1 id="out-title" style="text-align:center; font-size:34px; margin-bottom:40px; font-weight:900;"></h1>
        <div id="out-img" style="text-align: center; margin-bottom: 40px;"></div>
        <div id="out-intro-wrapper" style="margin-bottom:40px; border-left:6px solid var(--primary-color); padding-left:25px;"><p id="out-intro" style="opacity:0.9; white-space:pre-wrap; margin:0;"></p></div>
        <div class="info-bar" id="out-info-bar"></div>
        <div id="out-content"></div>
    </div>
</div>

<script>
    let charColorMap = {};
    let channelConfigs = {};
    let rawLogData = [];

    const DEFAULT_COLORS = { info: '#eeeeee', other: '#cfdbe3', custom: '#f9f9f9' };

    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }

    window.addEventListener('paste', e => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (item) {
            const r = new FileReader();
            r.onload = ev => { document.getElementById('image-preview').innerHTML = `<img src="${ev.target.result}" style="max-width:100%; max-height:100%; border-radius:12px;">`; if(document.getElementById('output').style.display === 'block') liveUpdateHeader(); };
            r.readAsDataURL(item.getAsFile());
        }
    });

    function handleFileSelect(i) { if (i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('image-preview').innerHTML = `<img src="${e.target.result}" style="max-width:100%; max-height:100%; border-radius:12px;">`; if(document.getElementById('output').style.display === 'block') liveUpdateHeader(); }; r.readAsDataURL(i.files[0]); } }

    document.getElementById('html-file').addEventListener('change', e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const doc = new DOMParser().parseFromString(ev.target.result, 'text/html');
            charColorMap = {}; channelConfigs = {}; rawLogData = [];
            doc.querySelectorAll('p').forEach(p => {
                const spans = p.querySelectorAll('span');
                if (spans.length >= 3) {
                    const ch = spans[0].innerText.trim();
                    const name = spans[1].innerText.trim();
                    if (ch && !channelConfigs[ch]) {
                        channelConfigs[ch] = { label: (ch === '[main]') ? 'メイン' : (ch === '[info]') ? '情報' : (ch === '[other]') ? '雜談' : ch.replace(/[\[\]]/g,''), bgColor: (ch === '[info]') ? DEFAULT_COLORS.info : (ch === '[other]') ? DEFAULT_COLORS.other : DEFAULT_COLORS.custom, checked: true };
                    }
                    if (name && name !== "system" && !charColorMap[name]) charColorMap[name] = rgbToHex(p.style.color) || "#4a4a4a";
                    rawLogData.push({ ch, name, html: spans[2].innerHTML, raw: spans[2].innerText });
                }
            });
            renderConfigPanel();
        };
        reader.readAsText(file, "UTF-8");
    });

    function rgbToHex(rgb) { if (!rgb || !rgb.startsWith('rgb')) return rgb; const res = rgb.match(/\d+/g).map(x => parseInt(x).toString(16).padStart(2, '0')); return `#${res.join('')}`; }

    function renderConfigPanel() {
        document.getElementById('config-panel').style.display = 'block';
        const chContainer = document.getElementById('channel-options'); chContainer.innerHTML = '';
        Object.keys(channelConfigs).forEach(ch => {
            if (ch === '[main]') return;
            const conf = channelConfigs[ch];
            const div = document.createElement('div'); div.className = 'channel-item';
            div.innerHTML = `<input type="checkbox" id="chk-${ch}" checked onchange="liveRenderLog()"><span style="min-width:65px; font-weight:bold; color:var(--primary-color);">${ch}</span><input type="text" style="width:130px; margin:0; padding:8px; border-radius:8px;" id="tag-${ch}" value="${conf.label}" oninput="liveRenderLog()"><div class="color-pill" style="margin-left:auto;"><span style="font-size:12px; opacity:0.7;">底色</span><input type="color" id="cp-ch-${ch}" value="${conf.bgColor.startsWith('#') ? conf.bgColor.substring(0,7) : '#eeeeee'}" oninput="updateChannelColor('${ch}', this.value)"><input type="text" class="hex-field" id="ct-ch-${ch}" value="${conf.bgColor}" oninput="updateChannelColor('${ch}', this.value)"></div>`;
            chContainer.appendChild(div);
        });
        const charContainer = document.getElementById('character-colors'); charContainer.innerHTML = '';
        Object.keys(charColorMap).forEach(name => {
            const div = document.createElement('div'); div.className = 'channel-item';
            div.innerHTML = `<span style="flex:1; font-weight:bold;">${name}</span><div class="color-pill"><input type="color" id="cp-${name}" value="${charColorMap[name]}" oninput="syncCharColor('${name}', this.value, 'text')"><input type="text" class="hex-field" id="ct-${name}" value="${charColorMap[name]}" oninput="syncCharColor('${name}', this.value, 'picker')"></div>`;
            charContainer.appendChild(div);
        });
    }

    function updateChannelColor(ch, val) { channelConfigs[ch].bgColor = val; if(document.getElementById(`cp-ch-${ch}`)) document.getElementById(`cp-ch-${ch}`).value = val.startsWith('#') ? val.substring(0,7) : '#eeeeee'; if(document.getElementById(`ct-ch-${ch}`)) document.getElementById(`ct-ch-${ch}`).value = val; liveRenderLog(); }
    function syncCharColor(name, val, target) { charColorMap[name] = val; if (target === 'text') document.getElementById(`ct-${name}`).value = val; else if (val.startsWith('#')) document.getElementById(`cp-${name}`).value = val.substring(0,7); liveRenderLog(); }

    let dragSrcEl = null;
    function handleDragStart(e) { dragSrcEl = this; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
    function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); this.classList.add('drag-over'); return false; }
    function handleDragLeave() { this.classList.remove('drag-over'); }
    function handleDrop(e) {
        if (e.stopPropagation) e.stopPropagation();
        if (dragSrcEl !== this) {
            const all = [...document.querySelectorAll('.log-item')];
            if (all.indexOf(dragSrcEl) < all.indexOf(this)) this.parentNode.insertBefore(dragSrcEl, this.nextSibling);
            else this.parentNode.insertBefore(dragSrcEl, this);
            checkMerging();
        }
        return false;
    }
    function handleDragEnd() { document.querySelectorAll('.log-item').forEach(el => { el.classList.remove('dragging', 'drag-over'); }); }

    function checkMerging() {
        const items = document.querySelectorAll('.log-item');
        let lastTag = null; let lastBg = null;
        items.forEach(item => {
            const block = item.querySelector('.block-styled');
            if (block) {
                const currentTag = block.dataset.tagName;
                const currentBg = block.style.backgroundColor;
                // 修正：必須同時滿足 標籤相同 且 顏色相同 才會融合
                if (currentTag === lastTag && currentBg === lastBg) block.setAttribute('data-merged', 'true');
                else block.removeAttribute('data-merged');
                lastTag = currentTag; lastBg = currentBg;
            } else { lastTag = null; lastBg = null; }
        });
    }

    function firstRender() { document.getElementById('output').style.display = 'block'; document.getElementById('action-area').style.display = 'flex'; liveUpdateHeader(); liveRenderLog(); window.scrollTo({ top: document.getElementById('output').offsetTop - 30, behavior: 'smooth' }); }

    function liveRenderLog() {
        const out = document.getElementById('out-content'); out.innerHTML = '';
        rawLogData.forEach(item => {
            const conf = channelConfigs[item.ch]; if (item.ch !== '[main]' && conf && !document.getElementById(`chk-${item.ch}`).checked) return;
            const wrap = document.createElement('div'); wrap.className = 'log-item'; wrap.draggable = true;
            wrap.addEventListener('dragstart', handleDragStart); wrap.addEventListener('dragover', handleDragOver); wrap.addEventListener('dragleave', handleDragLeave); wrap.addEventListener('drop', handleDrop); wrap.addEventListener('dragend', handleDragEnd);

            const displayColor = charColorMap[item.name] || "#4a4a4a";
            // 修正：結局偵測限定於 main 頻道
            const isEnding = (item.ch === '[main]' && item.raw.match(/END|結局|劇本通關/i));

            if (isEnding) {
                wrap.innerHTML = `<div class="ending-text">${item.raw.trim().replace(/[\s　]+/g, ' ')}</div>`; wrap.draggable = false;
            } else if (item.ch === '[main]') {
                wrap.innerHTML = `<div class="log-line" style="color:${(item.name===""||item.name==="system")?"var(--text-color)":displayColor}"><strong>${item.name?item.name+'：':''}</strong>${item.html}</div>`;
            } else if (item.ch === '[other]') {
                wrap.innerHTML = `<div class="other-bubble" style="background-color:${conf.bgColor}; color:${displayColor};"><strong>${item.name}：</strong>${item.html}</div>`;
            } else {
                const label = document.getElementById(`tag-${item.ch}`) ? document.getElementById(`tag-${item.ch}`).value : conf.label;
                wrap.innerHTML = `<div class="block-styled" data-tag-name="${label}" style="background-color:${conf.bgColor}; color:${displayColor};"><span class="info-tag">${label.toUpperCase()}</span><strong>${item.name}：</strong>${item.html}</div>`;
            }
            out.appendChild(wrap);
        });
        checkMerging();
    }

    function liveUpdateHeader() {
        if(document.getElementById('output').style.display !== 'block') return;
        document.getElementById('out-title').innerText = document.getElementById('scenario-name').value || 'Log';
        document.getElementById('out-intro').innerText = document.getElementById('intro-text').value;
        const img = document.getElementById('image-preview').querySelector('img');
        document.getElementById('out-img').innerHTML = img ? `<img src="${img.src}" style="max-width:50%; border-radius:12px;">` : '';
        const ho = document.getElementById('ho-info').value;
        document.getElementById('out-info-bar').innerHTML = `<div class="info-line"><span class="info-label">KP</span><span>${document.getElementById('kp-name').value}</span></div>` + formatHO(ho);
    }

    function formatHO(text) {
        return text.split('\n').map(line => {
            const t = line.trim(); if (!t) return '';
            const m = t.match(/^(HO\s*[^\s]+)\s*(.*)/i);
            if (m) { const color = charColorMap[m[2]] || 'var(--primary-color)'; return `<div class="info-line"><span class="info-label">${m[1].toUpperCase()}</span><span class="ho-value" style="color:${color}; font-weight:bold;">${m[2]}</span></div>`; }
            return `<div class="info-line">${t}</div>`;
        }).join('');
    }

    function downloadHTML() {
        const title = document.getElementById('scenario-name').value || 'Log';
        const content = document.getElementById('output').innerHTML;
        const style = document.querySelector('style').innerHTML;
        const fullHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>${style} #output{display:block;border:none;padding:20px;} .no-print, .log-item { cursor: default; } .dragging { opacity: 1; transform: none; } </style></head><body data-theme="${document.body.getAttribute('data-theme')}"><div class="container">${content}</div></body></html>`;
        const blob = new Blob([fullHTML], { type: 'text/html' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${title}.html`; a.click();
    }
</script>
</body>
</html>
