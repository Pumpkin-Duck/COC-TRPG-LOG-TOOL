<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="icon.webp" type="image/webp">
    <meta charset="UTF-8">
    <title>CoC TRPG 團錄整理工具</title>
    <style id="dynamic-theme">
        :root {
            --bg-color: #f4f1ea;
            --container-bg: #ffffff;
            --primary-color: #a67c52;
            --secondary-color: #8fa4b3;
            --text-color: #4a4a4a;
            --border-color: #dcdcdc;
            --bar-bg: #f4f1ea;
            --edit-color: #e67e22;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --primary-color: #c9ad93;
            --text-color: #d1d1d1;
            --border-color: #333333;
            --bar-bg: #121212;
        }

        @media print {
            @page { margin: 1.2cm; }
            body { 
                background: white !important; 
                color: black !important; 
                padding: 0 !important; 
            }
            .container { 
                box-shadow: none !important; 
                max-width: 100% !important; 
                padding: 0 !important; 
                border: none !important; 
            }
            .no-print, 
            .mode-switcher, 
            .edit-btn, 
            .add-ho-btn { 
                display: none !important; 
            }
            #output { 
                display: block !important; 
                border: none !important; 
                padding: 0 !important; 
            }
            .block-styled, 
            .ending-text, .info-bar { break-inside: avoid; }
        }

       body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 130px;
            margin: 0;
            line-height: 1.8;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--container-bg);
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
        }
        .theme-switch { position: fixed; top: 20px; right: 20px; padding: 10px 18px; border-radius: 30px; border: 1.5px solid var(--primary-color); background: var(--container-bg); color: var(--primary-color); cursor: pointer; font-weight: bold; z-index: 100; }

        .mode-switcher { display: inline-flex; background: #eeeae3; padding: 5px; border-radius: 50px; border: 1px solid var(--border-color); margin-right: 20px; }
        .mode-btn { padding: 10px 25px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; background: transparent; color: var(--text-color); opacity: 0.6; font-size: 15px; }
        .mode-btn.active { background: var(--primary-color); color: white; opacity: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        h1.tool-title { text-align: center; color: var(--primary-color); margin-bottom: 45px; font-size: 32px; letter-spacing: 2px; font-weight: 900; }
        label { display: block; font-weight: bold; margin-bottom: 12px; color: var(--primary-color); font-size: 16px; }
        input[type="text"], textarea { width: 100%; padding: 15px 20px; border: 1.5px solid var(--border-color); border-radius: 12px; box-sizing: border-box; background-color: #fafafa; color: #4a4a4a; margin-bottom: 15px; font-size: 15px; transition: 0.3s; }
        [data-theme="dark"] input[type="text"], [data-theme="dark"] textarea { background-color: #2a2a2a; color: #eee; border-color: #444; }

        .row { display: flex; gap: 40px; margin-bottom: 25px; align-items: flex-start; width: 100%; }
        .col-half { flex: 1; min-width: 0; }

        .color-pill {
            display: flex;
            align-items: center;
            background: #fff;
            padding: 8px 15px;
            border-radius: 20px; /* 稍微減小圓角，讓長方形感出來一點點 */
            border: 1.2px solid var(--border-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        /* 統一設定面板標題與上方 label 的風格 */
        .config-title {
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--primary-color);
            font-size: 16px;
            display: block;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(166, 124, 82, 0.2); /* 淡淡的分隔線 */
            margin-top: 30px;
        }

        [data-theme="dark"] .color-pill {
            background: #2a2a2a;
        }
        input[type="color"] { width: 22px; height: 22px; border: none; cursor: pointer; background: none; padding: 0; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
        .hex-field { border: none !important; background: transparent !important; margin-bottom: 0 !important; padding: 0 !important; width: 75px !important; font-family: monospace; font-size: 14px !important; color: inherit !important; font-weight: bold; }

        #ho-editor-list { margin-bottom: 15px; }
        .ho-edit-item { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .ho-tag-input { width: 80px !important; flex-shrink: 0; text-align: center; }
        .pl-name-input { flex: 1; min-width: 0; }

        .add-ho-btn { background: var(--container-bg); color: var(--primary-color); border: 1.5px solid var(--primary-color); padding: 8px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 5px; transition: 0.2s; }

        .channel-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; width: 100%; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .channel-name { min-width: 80px; font-weight: bold; color: var(--primary-color); }
        .channel-tag-input { width: 150px !important; margin: 0 !important; padding: 8px 15px !important; }

        #output { margin-top: 60px; padding: 50px; border: 1px solid var(--border-color); background: var(--container-bg); display: none; border-radius: 25px; }
        .log-item {
            position: relative;
            margin: 0;
        }

        /* main 文字段落 */
        .log-item.item-main .log-line {
            margin-top: 0;
            margin-bottom: 1.2em;
        }

       /* 一般 block 和 block 之間，保留清楚間距 */
        .log-item.item-block {
            margin-top: 18px;
        }

        /* 如果是真的合併塊第二塊以後，外層不要再多間距 */
        .log-item.merged-follow {
            margin-top: 0 !important;
        }

        /* main 後接 block，保留更明顯距離 */
        .log-item.after-main.item-block {
            margin-top: 28px;
        }

        /* block 後接 main，保留更明顯距離 */
        .log-item.after-block.item-main {
            margin-top: 28px;
        }

        /* ending 前後也保留明顯距離 */
        .log-item.item-ending {
            margin-top: 28px;
        }

        .log-item.after-ending.item-main,
        .log-item.after-ending.item-block {
            margin-top: 28px;
        }

        .edit-tools{
            position: absolute;
            left: -55px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 1;
            z-index: 20;
        }

        .edit-tools button{
            width:35px;
            height:35px;
            border-radius:50%;
            color:#e67e22;
            border:1.5px solid var(--border-color);
            background:var(--container-bg);
            cursor:pointer;
            font-size:15px;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        /* 編輯模式下，整個區塊可點選 */
        [data-mode="edit"] .log-item {
            cursor: pointer;
        }

        /* 編輯文字時改為 I 字形游標 */
        [data-mode="edit"] .text-content[contenteditable="true"] {
            cursor: text;
            user-select: text;
        }

        /* 被選中的區塊 */
        .log-item.active-item {
            outline: 1.5px dashed var(--primary-color);
            outline-offset: 6px;
            border-radius: 10px;
            background: rgba(166, 124, 82, 0.04);
        }

        .log-item.move-source {
            outline: 2px dashed #d97706;
            outline-offset: 6px;
            background: rgba(217, 119, 6, 0.06);
        }

        .text-content { 
            white-space: pre-wrap;
            outline: none;
            display: block;
            width: 100%;
        }
            [data-mode="edit"] .text-content:focus { background: rgba(230, 126, 34, 0.05); border-radius: 8px; }

        .log-line { 
            margin-bottom: 1.8em; 
            word-wrap: break-word; 
            font-size: 15px; 
        }

        
        .char-name-label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 2px; 
            font-size: 0.95em; 
        }
        .other-bubble { 
            width: fit-content; 
            max-width: 75%; 
            margin-left: auto; 
            padding: 15px 25px; 
            border-radius: 22px 22px 4px 22px; 
            text-align: right; 
            font-size: 15px; 
            margin-bottom: 1.6em; 
            border-right: 6px solid var(--secondary-color); 
            background: var(--bar-bg); 
        }
        .block-styled { 
            padding: 30px 35px; 
            border-radius: 15px; 
            margin: 0; 
            border-left: 10px solid ; 
            transition: none; 
        }
        .info-tag { font-weight: 700; color: var(--primary-color); font-size: 13px; display: block; margin-bottom: 12px; letter-spacing: 1px; }

        /* 當區塊被標記為合併時：去掉上方圓角、去掉上方邊框、去掉上方間距 */
        .block-styled[data-merged="true"] {
            margin-top: 0 !important;
            border-top-left-radius: 0 !important;
            border-top-right-radius: 0 !important;
            border-top: none !important;
            padding-top: 5px !important; /* 縮短內部頂部間距 */
        }

        /* 隱藏合併區塊內重複的標籤（例如：情報、系統） */
        .block-styled[data-merged="true"] .info-tag {
            display: none;
        }

        /* 處理被合併者的「前一個元素」：去掉下方圓角、去掉下方間距 */
        .log-item:has(+ .log-item .block-styled[data-merged="true"]) .block-styled {
            border-bottom-left-radius: 0 !important;
            border-bottom-right-radius: 0 !important;
            margin-bottom: 0 !important;
            padding-bottom: 5px !important;
        }

        /* 讓資訊列的間距與字級完全貼合內文 */
        .info-bar {
           padding: 10px 0;    /* 縮小上下內距 */
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 40px; /* 這就是分隔線上的那行空白感 */
            margin-bottom: 40px;  /* 分隔線下方的空白，與內文區隔 */
        }

        .info-line {
            display: flex;
            align-items: baseline; /* 讓文字對齊基準線 */
            margin-bottom: 4px !important; /* 強制縮小每一行的下間距 */
            font-size: 15px !important; /* 調整成跟內文一樣大 */
            line-height: 1.6 !important; /* 緊湊的行高 */
            font-weight: normal;
        }

        .info-line strong {
            min-width: 50px; /* 標籤寬度 */
            margin-right: 15px;
            flex-shrink: 0;
            font-weight: 400;
        }

        .file-upload-wrapper { text-align: center; padding: 55px 30px; border: 2.5px dashed var(--border-color); border-radius: 20px; background: rgba(0,0,0,0.01); margin: 40px 0; transition: 0.3s; }
        .file-upload-wrapper label { font-size: 18px; margin-bottom: 25px; color: var(--primary-color); opacity: 0.9; }

        .generate-btn { background-color: var(--primary-color); color: white; border: none; padding: 18px; border-radius: 15px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; box-shadow: 0 6px 15px rgba(166, 124, 82, 0.2); }
        .action-btn { background: #8fa4b3; color: white; padding: 15px 30px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; height: 60px; transition: 0.3s; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.2; }
        
    
        /* 編輯文字時改為 I 字形游標 */
        [data-mode="edit"] .text-content[contenteditable="true"] {
            cursor: text;
            user-select: text;
        }

       
        .insert-anchor-line{
            position: relative;
            height: 0;
            padding: 12px 0;
            margin: -12px 0;
            cursor: pointer;
            user-select: none;
            z-index: 15;
        }

        .insert-anchor-line::before{
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            border-top: 1.5px dashed var(--primary-color);
            transform: translateY(-50%);
            opacity: 0.9;
        }

        .insert-anchor-line span{
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--container-bg);
            padding: 0 10px;
            font-size: 12px;
            color: var(--primary-color);
            border-radius: 999px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .insert-anchor-line:hover::before{
            border-top-width: 2px;
        }

        .insert-anchor-line:hover span{
            background: #fffaf3;
        }

        @media (max-width: 1200px) {
            body {
                padding: 32px 60px;
            }

            .container {
                padding: 36px;
            }

            #output {
                padding: 36px;
            }

            .row {
                gap: 24px;
            }
        }

        @media (max-width: 900px) {
            body {
                padding: 24px 24px;
            }

            .container {
                padding: 26px;
                border-radius: 16px;
            }

            #output {
                padding: 28px;
                border-radius: 18px;
            }

            .row {
                flex-direction: column;
                gap: 20px;
            }

            .mode-switcher {
                margin-right: 0;
            }

            #character-colors {
                grid-template-columns: 1fr !important;
                gap: 14px !important;
            }

            .channel-item {
                flex-wrap: wrap;
                align-items: flex-start;
                gap: 10px;
            }

            .channel-name {
                min-width: auto;
            }

            .channel-tag-input {
                width: 100% !important;
            }
        }
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }

            .container {
                padding: 18px;
                border-radius: 14px;
            }

            #output {
                padding: 18px;
                border-radius: 14px;
            }

            h1.tool-title {
                font-size: 24px;
                margin-bottom: 28px;
            }

            .theme-switch {
                top: 12px;
                right: 12px;
                padding: 8px 12px;
                font-size: 13px;
            }

            .mode-switcher {
                width: 100%;
                justify-content: center;
            }

            .mode-btn {
                flex: 1;
                padding: 10px 12px;
                font-size: 14px;
            }

            .action-buttons {
                flex-direction: column;
                align-items: stretch !important;
            }

            .action-btn,
            .generate-btn {
                width: 100%;
            }

            .block-styled {
                padding: 20px 18px;
            }

            .other-bubble {
                max-width: 100%;
                padding: 12px 16px;
            }

            .edit-tools {
                left: -42px;
                gap: 6px;
            }

            .edit-tools button {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body data-theme="light" data-mode="view">

<button class="theme-switch no-print" id="theme-btn" onclick="toggleTheme()">切換暗色模式</button>

<div class="container">
    <h1 class="tool-title no-print">CoC TRPG 團錄整理工具</h1>
    
    <div class="input-section no-print">
        <div class="row"><div class="col-half"><label>劇本名</label><input type="text" id="scenario-name" placeholder="請輸入標題" oninput="saveToLocal()"></div></div>
        <div class="row">
            <div class="col-half">
                <label>簡介圖片 (貼上)</label>
                <div id="image-preview" style="width:100%; height:180px; border:2.5px dashed var(--secondary-color); display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:15px; background:rgba(0,0,0,0.02);" onclick="document.getElementById('image-input').click()"><span>點擊或貼上</span></div>
                <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleFileSelect(this)">
            </div>
            <div class="col-half"><label>簡介內容</label><textarea id="intro-text" style="height: 180px;" oninput="saveToLocal()"></textarea></div>
        </div>
        
        <div class="row">
            <div class="col-half">
                <label>KP 資訊</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="kp-name" placeholder="KP 名稱" oninput="saveToLocal(); liveUpdateHeader();" style="margin:0; flex: 1;">
                    <div class="color-pill">
                        <input type="color" id="kp-color" value="#a67c52" oninput="saveToLocal(); liveUpdateHeader();">
                        <input type="text" class="hex-field" id="kp-color-text" value="#a67c52" style="width:70px !important;" oninput="document.getElementById('kp-color').value=this.value; saveToLocal(); liveUpdateHeader();">
                    </div>
                </div>
            </div>
            
            <div class="col-half">
                <label>HO 與 PL 資訊</label>
                <div id="ho-editor-list"></div>
                <button class="add-ho-btn" onclick="addHORow()">+ 添加 HO 資訊</button>
            </div>
        </div>

        <div class="file-upload-wrapper no-print">
            <label>上傳 CCFOLIA 下載的 Log HTML 檔案</label>
            <input type="file" id="html-file" accept=".html">
        </div>
        
        <div style="margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 15px;" class="no-print">
            <label style="margin-bottom: 0; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="global-show-name" checked onchange="liveRenderLog(); saveToLocal();"> 
                <span>顯示對話名字</span>
            </label>
        </div>

        <details class="config-panel no-print" id="config-panel" style="margin-top: 20px; cursor: pointer;">
            <summary style="text-align: center; color: var(--primary-color); font-weight: bold; list-style: none; padding: 10px; border: 1.5px solid var(--border-color); border-radius: 12px; background: var(--container-bg);">
                🎨 展開進階顏色與頻道設定
            </summary>
            
            <div style="cursor: default; padding: 10px 0;">
                <div class="config-title">頻道與顏色設定</div>
                <div id="channel-options"></div>
                
                <div class="config-title">角色對話顏色調整</div>
                <div id="character-colors" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;"></div>
            </div>
        </details>
    </div>

    <button class="generate-btn no-print" onclick="firstRender()">輸出團錄預覽</button>
    <div class="action-buttons no-print" id="action-area" style="display:none; align-items: center; gap:15px; margin-top:40px; justify-content: center;">
        <div class="mode-switcher">
            <button class="mode-btn active" id="btn-view" onclick="switchMode('view')">閱覽模式</button>
            <button class="mode-btn" id="btn-edit" onclick="switchMode('edit')">編輯模式</button>
        </div>
        <button onclick="downloadHTML()" class="action-btn">下載HTML</button>
        <button onclick="window.print()" class="action-btn" style="background:#7a8d99;">儲存為 PDF</button>
    </div>

    <div id="output">
        <h1 id="out-title" style="text-align:center; font-size:34px; margin-bottom:40px; font-weight:900;"></h1>
        <div id="out-img" style="text-align: center; margin-bottom: 40px;"></div>
        <div id="out-intro-wrapper" style="margin-bottom:40px; border-left:6px solid var(--primary-color); padding-left:25px;"><p id="out-intro" style="opacity:0.9; white-space:pre-wrap; margin:0;"></p></div>
        <div class="info-bar" id="out-info-bar"></div>
        <div id="out-content"></div>
    </div>
</div>

<script>

    function normalizeImportedText(text) {
        if (typeof text !== 'string') return text;

        text = text
            .replace(/<br\s*\/?>/gi, '\n')
            .replace(/\r\n/g, '\n')
            .replace(/\r/g, '\n')
            .replace(/&nbsp;/g, '')
            .replace(/：[　\s]*/g, '：')
            .replace(/:[　\s]*/g, ':');

        const lines = text.split('\n');

        while (lines.length > 0 && lines[0].trim() === '') {
            lines.shift();
        }

        while (lines.length > 0 && lines[lines.length - 1].trim() === '') {
            lines.pop();
        }

        if (lines.length > 0) {
            lines[0] = lines[0].replace(/^[ \t　]+/, '');
            lines[lines.length - 1] = lines[lines.length - 1].replace(/[ \t　]+$/, '');
        }

        return lines.join('\n');
}

   

    function deleteLogItem(index) {
    if (confirm("確定要刪除這條訊息嗎？")) {
        rawLogData.splice(index, 1);

        if (activeIndex === index) {
            activeIndex = null;
        } else if (activeIndex > index) {
            activeIndex--;
        }

        if (moveSourceIndex === index) {
            moveSourceIndex = null;
            moveMode = false;
        } else if (moveSourceIndex > index) {
            moveSourceIndex--;
        }

        liveRenderLog();
        saveToLocal();
    }
}

    let charColorMap = {};
    let channelConfigs = {};
    let rawLogData = [];
    let hoList = [];
    let activeIndex = null;
    let moveSourceIndex = null;
    let moveMode = false;
    let editingIndex = null;


    const THEME_PRESETS = {
        light: { kpText: "#4a4a4a", infoBg: "#f9f9f9", otherBg: "#cfdbe3", customBg: "#f9f9f9" },
        dark: { kpText: "#d1d1d1", infoBg: "#2a2a2a", otherBg: "#1e2a33", customBg: "#1e1e1e" }
    };

    window.onload = function() { loadFromLocal(); };

    // 新增：監聽 Ctrl+V 貼上圖片功能
    window.addEventListener('paste', e => {
        // 檢查剪貼簿中是否有圖片
        const item = Array.from(e.clipboardData.items).find(x => x.type.startsWith('image'));
        if (item) {
            const file = item.getAsFile();
            const reader = new FileReader();
            reader.onload = ev => {
                // 將圖片預覽顯示在對應區塊
                document.getElementById('image-preview').innerHTML = `<img src="${ev.target.result}" style="max-width:100%; max-height:100%; border-radius:12px;">`;
                // 同步儲存到本地空間
                saveToLocal();
            };
            reader.readAsDataURL(file);
        }
    });

    function parseCustomMarkdown(text) {
        if (!text) return "";
        // 先處理換行，再處理 Markdown 符號
        let html = text.replace(/\n/g, '<br>');
        
        return html
            .replace(/-#([\s\S]*?)#-/g, '<span style="font-size: 0.85em; opacity: 0.6;">$1</span>')
            .replace(/##([\s\S]*?)##/g, '<h2 style="margin: 5px 0; font-size: 1.2em;">$1</h2>')
            .replace(/#([\s\S]*?)#/g, '<h1 style="margin: 10px 0; font-size: 1.4em;">$1</h1>')
            .replace(/\*\*([\s\S]*?)\*\*/g, '<b>$1</b>')
            .replace(/\/\/([\s\S]*?)\/\//g, '<i>$1</i>');
    }

    function saveToLocal() {
        const data = {
            scenarioName: document.getElementById('scenario-name').value,
            introText: document.getElementById('intro-text').value,
            kpName: document.getElementById('kp-name').value,
            hoList,
            theme: document.body.getAttribute('data-theme'),
            mode: document.body.getAttribute('data-mode'),
            globalShowName: document.getElementById('global-show-name').checked,
            imgSrc: document.getElementById('image-preview').querySelector('img')?.src || '',
            charColorMap, channelConfigs, rawLogData,
            isOutputVisible: document.getElementById('output').style.display === 'block'
        };
        localStorage.setItem('trpg_log_v44', JSON.stringify(data));
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('trpg_log_v44');
        if (!saved) { addHORow(); return; }
        const data = JSON.parse(saved);
        document.getElementById('scenario-name').value = data.scenarioName || '';
        document.getElementById('intro-text').value = data.introText || '';
        document.getElementById('kp-name').value = data.kpName || '';
        hoList = data.hoList || [];
        renderHOEditor();
        document.body.setAttribute('data-theme', data.theme || 'light');
        document.getElementById('global-show-name').checked = (data.globalShowName !== undefined) ? data.globalShowName : true;
        if (data.imgSrc) document.getElementById('image-preview').innerHTML = `<img src="${data.imgSrc}" style="max-width:100%; max-height:100%; border-radius:12px;">`;
        charColorMap = data.charColorMap || {};
        channelConfigs = data.channelConfigs || {};
        if (data.rawLogData) {
            rawLogData = data.rawLogData;
            renderConfigPanel();
            if (data.isOutputVisible) {
                document.getElementById('output').style.display = 'block';
                document.getElementById('action-area').style.display = 'flex';
                switchMode(data.mode || 'view');
                liveUpdateHeader();
                liveRenderLog();
            }
        }
        document.getElementById('theme-btn').innerText = data.theme === 'dark' ? '切換亮色模式' : '切換暗色模式';
    }

    function addHORow() {
        hoList.push({ ho: 'HO' + (hoList.length + 1), pl: '', color: '#a67c52' });
        renderHOEditor(); saveToLocal();
    }

    function renderHOEditor() {
        const container = document.getElementById('ho-editor-list'); container.innerHTML = '';
        hoList.forEach((item, index) => {
            const div = document.createElement('div'); div.className = 'ho-edit-item';
            div.innerHTML = `
                <input type="text" class="ho-tag-input" value="${item.ho}" oninput="updateHOData(${index}, 'ho', this.value)">
                <input type="text" class="pl-name-input" placeholder="PL 名稱" value="${item.pl}" oninput="updateHOData(${index}, 'pl', this.value)">
                <div class="color-pill">
                    <input type="color" value="${item.color}" oninput="updateHOData(${index}, 'color', this.value, 'picker', this)">
                    <input type="text" class="hex-field" value="${item.color}" oninput="updateHOData(${index}, 'color', this.value, 'text', this)">
                </div>
                <button onclick="removeHORow(${index})" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-weight:bold; font-size:20px; flex-shrink:0;">✕</button>`;
            container.appendChild(div);
        });
    }

    function updateHOData(index, key, val, source, el) {
        hoList[index][key] = val;
        if (key === 'color') {
            const parent = el.closest('.color-pill');
            if (source === 'picker') parent.querySelector('.hex-field').value = val;
            else parent.querySelector('input[type="color"]').value = val;
        }
        saveToLocal();
    }
    function removeHORow(index) { hoList.splice(index, 1); renderHOEditor(); saveToLocal(); }

    function switchMode(mode) {
        document.body.setAttribute('data-mode', mode);
        document.getElementById('btn-view').classList.toggle('active', mode === 'view');
        document.getElementById('btn-edit').classList.toggle('active', mode === 'edit');

        if (mode !== 'edit') {
            activeIndex = null;
            moveSourceIndex = null;
            moveMode = false;
            editingIndex = null;
        }

        liveRenderLog();
        saveToLocal();
    }

    function setActiveItem(index) {
        if (document.body.getAttribute('data-mode') !== 'edit') return;

        // 正在編輯時，不要因為點擊而重繪
        if (editingIndex !== null) return;

        // 已經是同一個 active，就不要重繪
        if (activeIndex === index) return;

        activeIndex = index;
        liveRenderLog();
    }

    function clearActiveItem() {
        if (document.body.getAttribute('data-mode') !== 'edit') return;

        // 正在編輯時，不要清掉 active
        if (editingIndex !== null) return;

        if (activeIndex === null) return;

        activeIndex = null;
        liveRenderLog();
    }

    function startMoveItem(index) {
        if (document.body.getAttribute('data-mode') !== 'edit') return;
        moveSourceIndex = index;
        moveMode = true;
        activeIndex = index;
        liveRenderLog();
    }

    function cancelMoveMode() {
        moveSourceIndex = null;
        moveMode = false;
        liveRenderLog();
    }

    function moveLogItem(targetIndex) {
        if (moveSourceIndex === null || moveSourceIndex === undefined) return;
        if (targetIndex === null || targetIndex === undefined) return;

        const movingItem = rawLogData[moveSourceIndex];
        if (!movingItem) return;

        rawLogData.splice(moveSourceIndex, 1);

        let adjustedTargetIndex = targetIndex;
        if (moveSourceIndex < targetIndex) {
            adjustedTargetIndex--;
        }

        rawLogData.splice(adjustedTargetIndex, 0, movingItem);

        activeIndex = adjustedTargetIndex;
        moveSourceIndex = null;
        moveMode = false;

        liveRenderLog();
        saveToLocal();
    }

    function createInsertLine(targetIndex) {
        const line = document.createElement('div');
        line.className = 'insert-anchor-line';
        line.innerHTML = `<span>插入到此處</span>`;

        line.addEventListener('click', function(e) {
            e.stopPropagation();
            moveLogItem(targetIndex);
        });

        return line;
    }

    function toggleTheme() { 
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const newTheme = isDark ? 'light' : 'dark';
        document.body.setAttribute('data-theme', newTheme);
        document.getElementById('theme-btn').innerText = newTheme === 'light' ? '切換暗色模式' : '切換亮色模式';
        updateColorsToTheme(newTheme); saveToLocal();
    }

    function updateColorsToTheme(theme) {
        const preset = THEME_PRESETS[theme];
        if (charColorMap["KP（空白）"]) charColorMap["KP（空白）"] = preset.kpText;
        Object.keys(channelConfigs).forEach(ch => {
            const conf = channelConfigs[ch];
            conf.bgColor = (ch === '[info]') ? preset.infoBg : (ch === '[other]') ? preset.otherBg : preset.customBg;
        });
        renderConfigPanel(); liveRenderLog();
    }

    function makeEditable(index) {
        if (document.body.getAttribute('data-mode') !== 'edit') return;
        if (moveMode) return;
        if (editingIndex === index) return;

        activeIndex = index;
        editingIndex = index;

        const textNode = document.querySelector(`[data-index="${index}"] .text-content`);
        if (!textNode) return;

        let cleanContent = rawLogData[index].html || '';
        
        textNode.innerText = cleanContent;
        textNode.contentEditable = "true";
        textNode.focus();

        textNode.onkeydown = function(e) {
            if (!e.ctrlKey) return;

            const key = e.key.toLowerCase();

            if (key === 'b') {
                e.preventDefault();
                wrapSelection(textNode, '**');
            } else if (key === 'i') {
                e.preventDefault();
                wrapSelection(textNode, '//');
            }
        };

        textNode.onblur = () => {
            textNode.contentEditable = "false";
            rawLogData[index].html = textNode.innerText;
            editingIndex = null;
            saveToLocal();
            liveRenderLog();
        };
    }

    function wrapSelection(el, wrapper) {
        const selection = window.getSelection();
        if (!selection.rangeCount) return;

        const range = selection.getRangeAt(0);

        // 確保選取範圍在這個編輯區內
        if (!el.contains(range.commonAncestorContainer)) return;

        const selectedText = selection.toString();

        if (selectedText.length > 0) {
            // 有選取文字 → 包起來
            const newText = wrapper + selectedText + wrapper;
            document.execCommand('insertText', false, newText);
        } else {
            // 沒選取 → 插入成對符號
            const newText = wrapper + wrapper;
            document.execCommand('insertText', false, newText);

            // 把游標往中間移
            moveCursorBackward(wrapper.length);
        }
    }

    function moveCursorBackward(count) {
        const selection = window.getSelection();
        if (!selection.rangeCount) return;

        const range = selection.getRangeAt(0);
        range.setStart(range.startContainer, range.startOffset - count);
        range.collapse(true);

        selection.removeAllRanges();
        selection.addRange(range);
    }

    function liveRenderLog() {
        const out = document.getElementById('out-content'); out.innerHTML = '';
        const globalShowName = document.getElementById('global-show-name')?.checked;
        const currentMode = document.body.getAttribute('data-mode');
        let lastRenderedType = null;
        
        rawLogData.forEach((item, index) => {
            const conf = channelConfigs[item.ch]; 
            if (item.ch !== '[main]' && conf && !conf.checked) return;
            
            const wrap = document.createElement('div'); 
            wrap.className = 'log-item';
            wrap.dataset.index = index;

            if (currentMode === 'edit' && index === activeIndex) {
                wrap.classList.add('active-item');
            }

            if (currentMode === 'edit' && moveMode && index === moveSourceIndex) {
                wrap.classList.add('move-source');
            }

            const displayColor = (item.name === "" || item.name === "system") ? charColorMap["KP（空白）"] : (charColorMap[item.name] || "#4a4a4a");
            const shouldShowName = (item.ch === '[other]' || (globalShowName && item.name && item.name !== "system"));
            const nameLabel = shouldShowName ? `<span class="char-name-label" style="color:${displayColor}">${item.name}</span>` : '';
            const parsedContent = parseCustomMarkdown(item.html);
            const alignStyle = item.align === "center" ? "text-align:center;" : "";
            const textHTML = `<div class="text-content" >${parsedContent}</div>`;

            let contentHTML = '';
            let renderType = 'main';

          
            // 處理 [main] 頻道與結局偵測
            if (item.ch === '[main]') {
                const rawMainText = item.html || '';

                const isKPOrSystem = item.name.includes("KP") || item.name === "" || item.name === "system";
                const hasKeyWord = /結局|ENDING|END|FIN|通關/i.test(rawMainText);
                const noMarkers = !/[「」""。]/.test(rawMainText);

                if (isKPOrSystem && hasKeyWord && noMarkers && rawMainText.trim() !== "") {
                    renderType = 'ending';
                    const endingHTML = `<span class="text-content">${parseCustomMarkdown(rawMainText)}</span>`;
                    contentHTML = `<div class="log-line ending-text" style="color:${displayColor}; text-align:center; font-weight:900; font-size:1.3em; background:rgba(128,128,128,0.08); border-radius:10px; border-top:2px solid ${displayColor}; border-bottom:2px solid ${displayColor}; letter-spacing:3px;">${endingHTML}</div>`;
                } else {
                    renderType = 'main';
                    contentHTML = `<div class="log-line" style="${alignStyle} color:${displayColor};">${nameLabel}${textHTML}</div>`;
                }
            }
            else if (item.ch === '[other]') {
                renderType = 'other';
                contentHTML = `<div class="other-bubble" style="background-color:${conf.bgColor}; color:${displayColor}; text-align:right;">${nameLabel}${textHTML}</div>`;
            }
          
            // 處理其餘區塊頻道 (如：情報、系統、自訂標籤)
            else {
                renderType = 'block';
                const label = (item.ch === '[info]') ? '情報' : (document.getElementById(`tag-${item.ch}`)?.value || conf.label);

                // 判斷基礎顏色
                let dynamicColor = conf.borderColor || "var(--primary-color)";

                // 如果頻道沒自訂邊框 (或維持預設)，則嘗試偵測 PL 顏色
                if (!conf.borderColor || conf.borderColor === "var(--primary-color)") {
                    const isKP = item.name.toUpperCase().includes("KP");
                    const isEmpty = !item.name.trim() || item.name === "system";
                    if (!isKP && !isEmpty) {
                        dynamicColor = charColorMap[item.name] || "var(--primary-color)";
                    }
                }

                contentHTML = `
                    <div class="block-styled" data-channel="${item.ch}" data-tag-name="${label}"
                        style="background-color:${conf.bgColor}; color:${displayColor}; border-left-color:${dynamicColor} !important;">
                        <span class="info-tag" style="color:${dynamicColor} !important;">${label}</span>
                        ${nameLabel}
                        <div class="text-content" style="${alignStyle}">${parsedContent}</div>
                    </div>`;
            }
            const editUI = (currentMode === 'edit' && index === activeIndex) ? 
            `<div class="edit-tools">
                <button onclick="event.stopPropagation(); deleteLogItem(${index})" title="刪除">🗑</button>
                <button onclick="event.stopPropagation(); toggleCenter(${index})" title="置中">≡</button>
                <button onclick="event.stopPropagation(); startMoveItem(${index})" title="移動">↕</button>
            </div>` : '';

            if (renderType === 'main') {
                wrap.classList.add('item-main');
            } else if (renderType === 'block') {
                wrap.classList.add('item-block');
            } else if (renderType === 'ending') {
                wrap.classList.add('item-ending');
            } else if (renderType === 'other') {
                wrap.classList.add('item-other');
            }

            if (lastRenderedType === 'main' && renderType === 'block') {
                wrap.classList.add('after-main');
            }
            if (lastRenderedType === 'block' && renderType === 'main') {
                wrap.classList.add('after-block');
            }
            if (lastRenderedType === 'block' && renderType === 'block') {
                wrap.classList.add('after-block');
            }
            if (lastRenderedType === 'ending' && (renderType === 'main' || renderType === 'block')) {
                wrap.classList.add('after-ending');
            }

            wrap.innerHTML = editUI + contentHTML;

            if (currentMode === 'edit' && moveMode) {
                const isSamePlace = index === moveSourceIndex;
                const isNextPlace = index === moveSourceIndex + 1;

                if (!isSamePlace && !isNextPlace) {
                    out.appendChild(createInsertLine(index));
                }
            }
            out.appendChild(wrap);
            lastRenderedType = renderType;
        });
        if (currentMode === 'edit' && moveMode) {
            const tailIndex = rawLogData.length;
            const isSamePlace = tailIndex === moveSourceIndex;
            const isNextPlace = tailIndex === moveSourceIndex + 1;

            if (!isSamePlace && !isNextPlace) {
                out.appendChild(createInsertLine(tailIndex));
            }
        }
        checkMerging();
    }

    function toggleCenter(index) {
        const item = rawLogData[index];
        
        if (!item.align) item.align = "left";
        
        item.align = (item.align === "center") ? "left" : "center";
        
        saveToLocal();
        liveRenderLog();
    }

    function checkMerging() {
        const items = document.querySelectorAll('.log-item');
        let i = 0;

        while (i < items.length) {
            const item = items[i];
            const block = item.querySelector('.block-styled');

            if (!block) {
                i++;
                continue;
            }

            // --- 1. 找出這一組「合併塊」的範圍 ---
            let group = [item];
            let j = i + 1;
            const currentChannel = block.getAttribute('data-channel');
            const currentBg = block.style.backgroundColor;

            while (j < items.length) {
                const nextBlock = items[j].querySelector('.block-styled');
                if (nextBlock && 
                    nextBlock.getAttribute('data-channel') === currentChannel && 
                    nextBlock.style.backgroundColor === currentBg &&
                    nextBlock.getAttribute('data-split') !== 'true') {
                    group.push(items[j]);
                    j++;
                } else {
                    break;
                }
            }

            // --- 2. 在這一組中「搜尋」第一個符合條件的角色顏色 ---
            let groupColor = null;
            for (let member of group) {
                const dataIndex = member.dataset.index;
                const logEntry = rawLogData[dataIndex];
                
                // 排除條件：包含 KP (不分大小寫)、system、或是空名字
                const isNotKP = !logEntry.name.toUpperCase().includes("KP");
                const isNotEmpty = logEntry.name.trim() !== "" && logEntry.name !== "system";

                if (isNotKP && isNotEmpty) {
                    groupColor = charColorMap[logEntry.name];
                    break; // 找到第一個角色了，跳出循環
                }
            }

            // --- 3. 決定最終邊框顏色 ---
            // 優先序：頻道自訂邊色 > 剛才搜到的角色色 > 預設咖啡色
            const conf = channelConfigs[rawLogData[item.dataset.index].ch];
            const finalColor = (conf.borderColor && conf.borderColor !== "var(--primary-color)") 
                            ? conf.borderColor 
                            : (groupColor || "var(--primary-color)");

            // --- 4. 統一套用顏色與合併狀態 ---
            group.forEach((member, idx) => {
                const memberBlock = member.querySelector('.block-styled');

                if (idx > 0) {
                    memberBlock.setAttribute('data-merged', 'true');
                    member.classList.add('merged-follow');
                } else {
                    memberBlock.removeAttribute('data-merged');
                    member.classList.remove('merged-follow');
                }

                memberBlock.style.setProperty('border-left-color', finalColor, 'important');
                const infoTag = memberBlock.querySelector('.info-tag');
                if (infoTag) infoTag.style.color = finalColor;
            });

            i = j; // 跳到下一組
        }
    }

    function firstRender() { document.getElementById('output').style.display = 'block'; document.getElementById('action-area').style.display = 'flex'; liveUpdateHeader(); liveRenderLog(); window.scrollTo({ top: document.getElementById('output').offsetTop - 30, behavior: 'smooth' }); saveToLocal(); }

    function liveUpdateHeader() {
        if(document.getElementById('output').style.display !== 'block') return;
        const sName = document.getElementById('scenario-name').value.trim(), titleEl = document.getElementById('out-title');
        titleEl.innerText = sName || ''; titleEl.style.display = sName ? 'block' : 'none';
        document.getElementById('out-intro').innerText = document.getElementById('intro-text').value;
        const img = document.getElementById('image-preview').querySelector('img');
        document.getElementById('out-img').innerHTML = img ? `<img src="${img.src}" style="max-width:50%; border-radius:12px;">` : '';
        let infoBarHTML = '';
        const kp = document.getElementById('kp-name').value.trim();
        // 讀取剛剛新增的顏色選擇器的值
        const kpColor = document.getElementById('kp-color').value; 
        
        if (kp) {
            infoBarHTML += `<div class="info-line" style="color:${kpColor}"><strong style="margin-right:12px; min-width:40px;">KP</strong><span>${kp}</span></div>`;
        }
        hoList.forEach(item => {
            if(item.ho || item.pl) infoBarHTML += `<div class="info-line" style="color:${item.color}"><strong style="margin-right:12px; min-width:40px;">${item.ho}</strong><span>${item.pl}</span></div>`;
        });
        const infoBarEl = document.getElementById('out-info-bar');
        infoBarEl.innerHTML = infoBarHTML; infoBarEl.style.display = infoBarHTML ? 'block' : 'none';
    }

    function downloadHTML() {
        const title = document.getElementById('scenario-name').value || 'Log', content = document.getElementById('output').innerHTML, style = document.querySelector('style').innerHTML, currentTheme = document.body.getAttribute('data-theme');
        const fullHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>${style} #output{display:block;border:none;padding:20px;} .no-print { display:none !important; } .log-item { cursor: default; } .edit-btn, .mode-switcher { display: none !important; } </style></head><body data-theme="${currentTheme}"><div class="container">${content}</div></body></html>`;
        const blob = new Blob([fullHTML], { type: 'text/html' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${title}.html`; a.click();
    }

    function rgbToHex(rgb) { if (!rgb || !rgb.startsWith('rgb')) return rgb; const res = rgb.match(/\d+/g).map(x => parseInt(x).toString(16).padStart(2, '0')); return `#${res.join('')}`; }
    function handleFileSelect(i) { if (i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('image-preview').innerHTML = `<img src="${e.target.result}" style="max-width:100%; max-height:100%; border-radius:12px;">`; if(document.getElementById('output').style.display === 'block') liveUpdateHeader(); saveToLocal(); }; r.readAsDataURL(i.files[0]); } }

    document.getElementById('html-file').addEventListener('change', e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const doc = new DOMParser().parseFromString(ev.target.result, 'text/html');
            charColorMap = {}; channelConfigs = {}; rawLogData = [];
            const currentTheme = document.body.getAttribute('data-theme') || 'light';
            charColorMap["KP（空白）"] = THEME_PRESETS[currentTheme].kpText;
            doc.querySelectorAll('p').forEach(p => {
                const spans = p.querySelectorAll('span');
                if (spans.length >= 3) {
                    const ch = spans[0].innerText.trim(), name = spans[1].innerText.trim();
                    if (ch && !channelConfigs[ch]) {
                        let finalLabel = ch.replace(/[\[\]]/g, '');
                        if (finalLabel.toLowerCase() === 'info') finalLabel = '情報';
                        else if (finalLabel.toLowerCase() === 'other') finalLabel = '雜談';
                        channelConfigs[ch] = { label: finalLabel, bgColor: (ch === '[info]') ? THEME_PRESETS[currentTheme].infoBg : (ch === '[other]') ? THEME_PRESETS[currentTheme].otherBg : THEME_PRESETS[currentTheme].customBg, checked: (ch !== '[other]') };
                    }
                    if (name && name !== "system" && !charColorMap[name]) charColorMap[name] = rgbToHex(p.style.color) || "#4a4a4a";
                    const rawHtml = spans[2].innerHTML || '';
                    const normalizedText = normalizeImportedText(rawHtml);

                    rawLogData.push({
                        ch,
                        name,
                        html: normalizedText,
                        raw: normalizedText
                    });
                }
            });
            renderConfigPanel(); saveToLocal();
        };
        reader.readAsText(file, "UTF-8");
    });

    function renderConfigPanel() {
        document.getElementById('config-panel').style.display = 'block';
        const chContainer = document.getElementById('channel-options'); chContainer.innerHTML = '';
        Object.keys(channelConfigs).forEach(ch => {
            if (ch === '[main]') return;
            const conf = channelConfigs[ch];
            const div = document.createElement('div'); div.className = 'channel-item';
            // 在 renderConfigPanel 裡面修改頻道設定的 HTML
            div.innerHTML = `
                <input type="checkbox" id="chk-${ch}" ${conf.checked?'checked':''} onchange="channelConfigs['${ch}'].checked=this.checked; liveRenderLog(); saveToLocal();">
                <span class="channel-name">${ch.replace(/[\[\]]/g,'')}</span>
                <input type="text" class="channel-tag-input" id="tag-${ch}" value="${conf.label}" oninput="liveRenderLog(); saveToLocal();">
                
                <div class="color-pill" style="margin-left:auto; gap:12px; padding: 6px 15px; height: auto;">
                    <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
                        <span style="font-size:10px; opacity:0.6;">底色</span>
                        <input type="color" value="${conf.bgColor.substring(0,7)}" oninput="updateChannelColor('${ch}', 'bgColor', this.value, 'picker', this)">
                        <input type="text" class="hex-field" value="${conf.bgColor}" style="width:55px !important; font-size:11px !important; text-align:center;" oninput="updateChannelColor('${ch}', 'bgColor', this.value, 'text', this)">
                    </div>
                    
                    <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
                        <span style="font-size:10px; opacity:0.6;">邊色</span>
                        <input type="color" value="${(conf.borderColor || '#a67c52').substring(0,7)}" oninput="updateChannelColor('${ch}', 'borderColor', this.value, 'picker', this)">
                        <input type="text" class="hex-field" value="${conf.borderColor || '#a67c52'}" style="width:55px !important; font-size:11px !important; text-align:center;" oninput="updateChannelColor('${ch}', 'borderColor', this.value, 'text', this)">
                    </div>
                </div>`;
            chContainer.appendChild(div);
        });
        const charContainer = document.getElementById('character-colors'); charContainer.innerHTML = '';
        Object.keys(charColorMap).forEach(name => {
            const color = charColorMap[name];
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = `
                <span style="flex:1; font-weight:bold; color: ${color}">${name}</span>
                <div class="color-pill">
                    <input type="color" id="cp-${name}" value="${color}" oninput="syncCharColor('${name}', this.value, 'picker'); renderConfigPanel();">
                    <input type="text" class="hex-field" id="ct-${name}" value="${color}" oninput="syncCharColor('${name}', this.value, 'text'); renderConfigPanel();">
                </div>`;
            charContainer.appendChild(div);
        });
    }
    function updateChannelColor(ch, key, val, source, el) { 
        channelConfigs[ch][key] = val; 
        
        // 同步 UI：如果是點圓圈，就更新文字框；如果是打字，就更新圓圈
        const parent = el.parentNode;
        if (source === 'picker') {
            parent.querySelector('input[type="text"]').value = val;
        } else if (val.startsWith('#') && val.length === 7) {
            parent.querySelector('input[type="color"]').value = val;
        }
        
        liveRenderLog(); 
        saveToLocal(); 
    }
    function syncCharColor(name, val, source) { 
        charColorMap[name] = val; 
        if (source === 'picker') document.getElementById(`ct-${name}`).value = val; else if (val.startsWith('#')) document.getElementById(`cp-${name}`).value = val.substring(0,7);
        saveToLocal(); 
    }

    document.getElementById('out-content').addEventListener('click', function(e) {
        if (document.body.getAttribute('data-mode') !== 'edit') return;

        const logItem = e.target.closest('.log-item');
        if (!logItem) return;

        if (e.target.closest('.edit-tools')) return;
        if (moveMode) return;

        const index = Number(logItem.dataset.index);
        if (Number.isNaN(index)) return;

        // 正在編輯同一塊，不重進
        if (editingIndex === index) return;

        // 正在編輯別塊，先讓 blur 處理
        if (editingIndex !== null) return;

        if (activeIndex !== index) {
            activeIndex = index;
            liveRenderLog();

            requestAnimationFrame(() => {
                makeEditable(index);
            });
        } else {
            makeEditable(index);
        }
    });

    document.addEventListener('click', function(e) {
        if (document.body.getAttribute('data-mode') !== 'edit') return;

        const clickedLogItem = e.target.closest('.log-item');
        const clickedEditTool = e.target.closest('.edit-tools');
        const clickedInsertLine = e.target.closest('.insert-anchor-line');

        if (!clickedLogItem && !clickedEditTool && !clickedInsertLine) {
            if (moveMode) {
                cancelMoveMode();
                return;
            }

            if (editingIndex !== null) return;

            clearActiveItem();
        }
    });
</script>
</body>
</html>
